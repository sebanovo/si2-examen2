services:
  serv-mech-db:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    # expose:
    #   - "5432"
    ports:
      - "${POSTGRES_HOST_PORT}:5432"
    volumes:
      - mech_db_data:/var/lib/postgresql/data
    networks:
      - mechanic-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  serv-mech-redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    # Sin expose al host
    networks:
      - mechanic-net
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  serv-mech-api:
    build:
      context: ./mechanic-api
      dockerfile: Dockerfile.prod        # ← imagen optimizada, sin --reload
    restart: unless-stopped
    env_file:
      - .env
    expose:
      - "8000"                           # solo visible para nginx, no al host
    # Sin volume mount — el código va dentro de la imagen
    depends_on:
      serv-mech-db:
        condition: service_healthy
      serv-mech-redis:
        condition: service_healthy
    networks:
      - mechanic-net
    healthcheck:
      test:
        [
          "CMD", "python", "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/system/health', timeout=5).read()"
        ]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 15s

  serv-mech-worker:
    build:
      context: ./mechanic-api
      dockerfile: Dockerfile.prod        # misma imagen que la api
    restart: unless-stopped
    command: ["/app/scripts/start_worker.sh"]
    env_file:
      - .env
    volumes:
      - storage_data:/app/storage        # solo storage persiste, no el código
    depends_on:
      serv-mech-db:
        condition: service_healthy
      serv-mech-redis:
        condition: service_healthy
    networks:
      - mechanic-net

  serv-mech-web:
    build:
      context: ./mechanic-web
      dockerfile: Dockerfile.prod        # ng build → nginx:alpine, sin node
    restart: unless-stopped
    expose:
      - "80"                             # nginx externo accede por aquí
    # Sin volumes, sin CHOKIDAR, sin node_modules montado
    depends_on:
      - serv-mech-api
    networks:
      - mechanic-net
  
  serv-mech-flutter-web:
    build:
      context: ./mechanic_mobile
      dockerfile: Dockerfile.prod 
    restart: unless-stopped
    depends_on:
      - serv-mech-api
    networks:
      - mechanic-net


  serv-nginx:
    image: nginx:stable-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"                        # SSL en prod
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx/certs:/etc/nginx/certs:ro   # tus certificados TLS
    depends_on:
      - serv-mech-web
      - serv-mech-api
      - serv-mech-flutter-web
    networks:
      - mechanic-net

volumes:
  mech_db_data:
  redis_data:
  storage_data:                          # node_modules eliminado — no aplica en prod

networks:
  mechanic-net:
    name: mechanic-system_mechanic-net
    driver: bridge