<hlm-field>
  <label hlmFieldLabel [for]="inputId()">{{ label() }}</label>

  <div class="relative">
    <ng-icon
      [name]="icon()"
      class="text-muted-foreground absolute top-1/2 left-3 -translate-y-1/2 text-base"
    />

    <input
      hlmInput
      class="pr-10 pl-10"
      [id]="inputId()"
      [type]="showPassword() ? 'text' : 'password'"
      [placeholder]="placeholder()"
      [formControl]="control()"
    />

    <button
      type="button"
      class="text-muted-foreground absolute top-1/2 right-3 -translate-y-1/2 cursor-pointer"
      (click)="togglePassword()"
      tabindex="-1"
      aria-label="Mostrar u ocultar contraseña"
    >
      <ng-icon
        [name]="showPassword() ? 'lucideEyeOff' : 'lucideEye'"
        class="text-base"
      />
    </button>
  </div>

  @if (description()) {
    <p hlmFieldDescription>
      {{ description() }}
    </p>
  }

  <hlm-field-error validator="required">
    {{ requiredMessage() }}
  </hlm-field-error>

  <hlm-field-error validator="minlength">
    {{ minLengthMessage() }}
  </hlm-field-error>
</hlm-field>
