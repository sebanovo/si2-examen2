<!-- health-check.component.html -->
<section class="p-6">
  <h2 class="text-xl font-bold mb-4">Database connection test</h2>

  <button
    type="button"
    (click)="handleCheckDatabase()"
    [disabled]="loading()"
    class="px-4 py-2 bg-blue-900 text-white rounded hover:bg-blue-600 disabled:opacity-50"
  >
    {{ loading() ? 'Checking...' : 'Check database connection' }}
  </button>

  @if (response()) {
    <div class="mt-4">
      <p><strong>Status:</strong> {{ response()?.status }}</p>
      <p><strong>Database:</strong> {{ response()?.database }}</p>
      <p><strong>Result:</strong> {{ response()?.result }}</p>
    </div>
  }

  @if (error()) {
    <div class="mt-4 text-red-600">
      <p><strong>Error:</strong> {{ error() }}</p>
    </div>
  }
  
</section>
