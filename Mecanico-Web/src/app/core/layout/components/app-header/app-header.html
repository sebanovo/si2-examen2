<header
	class="sticky top-0 z-30 border-b border-slate-200 bg-white/90 backdrop-blur"
>
	<div class="flex h-16 items-center justify-between gap-4 px-4 sm:px-6">
		<div class="flex min-w-0 items-center gap-3">
			<button
				hlmBtn
				variant="outline"
				size="sm"
				class="lg:hidden"
				type="button"
				(click)="openMobileSidebar()"
				aria-label="Abrir menú"
			>
				<ng-icon name="lucideMenu" class="text-base" />
			</button>

			<div class="min-w-0">
				<p class="truncate text-sm font-medium text-slate-500">
					{{ subtitle() }}
				</p>
				<h1 class="truncate text-base font-semibold text-slate-900 sm:text-lg">
					{{ title() }}
				</h1>
			</div>
		</div>

		<div class="hidden min-w-0 flex-1 justify-center px-4 md:flex">
			@if (showSearch()) {
				<div class="relative w-full max-w-md">
					<ng-icon
						name="lucideSearch"
						class="pointer-events-none absolute top-1/2 left-3 -translate-y-1/2 text-slate-400"
					/>
					<input
						hlmInput
						type="text"
						[placeholder]="searchPlaceholder()"
						class="pl-10"
						aria-label="Buscar en el sistema"
					/>
				</div>
			}
		</div>

		<div class="flex items-center gap-2 sm:gap-3">
			@if (showSearch()) {
				<button
					hlmBtn
					variant="outline"
					size="sm"
					class="md:hidden"
					type="button"
					aria-label="Buscar"
				>
					<ng-icon name="lucideSearch" class="text-base" />
				</button>
			}

			@if (showNotifications()) {
				<button
					hlmBtn
					variant="outline"
					size="sm"
					type="button"
					aria-label="Notificaciones"
				>
					<ng-icon name="lucideBell" class="text-base" />
				</button>
			}

			<!-- <app-change-password-dialog
        [open]="changePasswordDialogOpen()"
        [isSubmitting]="passwordStore.changeSubmitting()"
        [errorMessage]="passwordStore.changeError()?.message ?? null"
        (openChange)="onChangePasswordDialogOpenChange($event)"
        (submitChangePassword)="onSubmitChangePassword($event)"
        (formEdited)="passwordStore.clearChangeError()"
      /> -->

			<app-user-menu
				[userName]="userName()"
				[userEmail]="userEmail()"
				[avatarUrl]="avatarUrl()"
				(changePasswordClick)="onClickChangePassword()"
				(profileClick)="onClickPerfil()"
				(settingsClick)="onClickSettings()"
				(logoutClick)="onClickLogout()"
			/>
		</div>
	</div>
</header>
