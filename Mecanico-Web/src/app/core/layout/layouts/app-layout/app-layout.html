<div class="h-screen overflow-hidden bg-slate-50 text-slate-900">
  <div class="flex h-full">
    <div class="relative flex h-full">
      <app-app-sidebar [collapsed]="layoutState.sidebarCollapsed()" />

      <button
        type="button"
        (click)="layoutState.toggleSidebarCollapsed()"
        class="absolute top-20 -right-3 z-30 hidden h-7 w-7 items-center justify-center rounded-full border border-slate-200 bg-white shadow-sm transition hover:bg-slate-100 lg:flex"
        aria-label="Toggle sidebar"
      >
        <ng-icon
          [name]="
            layoutState.sidebarCollapsed()
              ? 'lucideChevronRight'
              : 'lucideChevronLeft'
          "
          class="text-sm"
        />
      </button>
    </div>

    <main class="flex min-h-0 min-w-0 flex-1 flex-col overflow-hidden">
      <app-app-header />

      <section class="min-h-0 flex-1 overflow-x-hidden overflow-y-auto p-6">
        <router-outlet />
      </section>
    </main>
  </div>

  @if (layoutState.mobileSidebarOpen()) {
    <div class="fixed inset-0 z-40 lg:hidden">
      <button
        type="button"
        class="absolute inset-0 bg-slate-950/40"
        aria-label="Cerrar menú"
        (click)="layoutState.closeMobileSidebar()"
      ></button>

      <div class="absolute inset-y-0 left-0 z-50 w-72 max-w-[85vw]">
        <app-app-sidebar [collapsed]="false" [mobile]="true" />
      </div>
    </div>
  }
</div>
