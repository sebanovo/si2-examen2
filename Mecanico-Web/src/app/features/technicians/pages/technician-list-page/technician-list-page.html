<section class="space-y-6">
	<div>
		<button hlmBtn variant="outline" class="cursor-pointer" (click)="onBack()">
			<ng-icon name="lucideArrowLeft" />
			Volver a proveedores
		</button>
	</div>

	<section hlmCard>
		<app-card-header
			title="Técnicos del proveedor"
			description="Gestiona los técnicos asociados al proveedor seleccionado"
			icon="lucideUsers"
			[showAction]="!store.isEmpty()"
			actionLabel="Nuevo"
			actionIcon="lucidePlus"
			(actionClick)="onOpenCreateDialog()"
		/>

		<div hlmCardContent class="space-y-4">
			@if (store.loading() && !store.hasLoaded()) {
				<div class="space-y-4">
					<hlm-skeleton class="h-10 w-full rounded-md" />
					<hlm-skeleton class="h-10 w-full rounded-md" />
					<hlm-skeleton class="h-10 w-full rounded-md" />
					<hlm-skeleton class="h-10 w-full rounded-md" />
				</div>
			} @else if (store.hasError()) {
				<app-table-error
					variant="destructive"
					icon="lucideAlertCircle"
					[description]="
						store.error()?.message || 'Ocurrió un error inesperado'
					"
					title="No se pudieron cargar los técnicos"
					[showAction]="true"
					actionLabel="Reintentar"
					(actionClick)="onRetry()"
				/>
			} @else if (store.isEmpty()) {
				<app-empty-state
					title="Sin técnicos"
					description="Aún no existen técnicos registrados para este proveedor."
					icon="lucideInbox"
					[showAction]="true"
					actionLabel="Registrar primer técnico"
					actionIcon="lucidePlus"
					(actionClick)="onOpenCreateDialog()"
				/>
			} @else {
				<app-technician-table
					[technicians]="store.technicians()"
					(editTechnician)="onEditTechnician($event)"
				/>

				<div class="border-t pt-4">
					<p class="text-muted-foreground text-sm">
						Total técnicos: {{ store.techniciansCount() }}
					</p>
				</div>
			}
		</div>
	</section>

	<app-technician-create-dialog
		[open]="createDialogOpen()"
		[loading]="store.creatingTechnician()"
		[error]="store.creatingTechnicianError()"
		(openChange)="onCreateDialogOpenChange($event)"
		(createTechnician)="onCreateTechnician($event)"
	/>

	<app-technician-edit-dialog
		[open]="editDialogOpen()"
		[technician]="selectedTechnicianForEdit()"
		[loading]="store.updatingTechnician()"
		[error]="store.updatingTechnicianError()"
		(openChange)="onEditDialogOpenChange($event)"
		(updateTechnician)="onUpdateTechnician($event)"
	/>
</section>
