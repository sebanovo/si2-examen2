<section class="space-y-6">
	<div>
		<button hlmBtn variant="outline" class="cursor-pointer" (click)="onBack()">
			<ng-icon name="lucideArrowLeft" />
			Volver a proveedores
		</button>
	</div>

	<section hlmCard>
		<app-card-header
			title="Servicios del proveedor"
			description="Consulta los servicios asociados al proveedor seleccionado"
			icon="lucideWrench"
			[showAction]="false"
		/>

		<div hlmCardContent class="space-y-4">
			@if (store.loading() && !store.hasLoaded()) {
				<div class="space-y-4">
					<hlm-skeleton class="h-10 w-full rounded-md" />
					<hlm-skeleton class="h-10 w-full rounded-md" />
					<hlm-skeleton class="h-10 w-full rounded-md" />
					<hlm-skeleton class="h-10 w-full rounded-md" />
				</div>
			} @else if (store.hasError()) {
				<app-table-error
					variant="destructive"
					icon="lucideAlertCircle"
					[description]="
						store.error()?.message || 'Ocurrió un error inesperado'
					"
					title="No se pudieron cargar los servicios"
					[showAction]="true"
					actionLabel="Reintentar"
					(actionClick)="onRetry()"
				/>
			} @else if (store.isEmpty()) {
				<app-empty-state
					title="Sin servicios"
					description="Aún no existen servicios asociados a este proveedor."
					icon="lucideInbox"
					[showAction]="false"
				/>
			} @else {
				<app-provider-service-table
					[providerServices]="store.providerServices()"
				/>

				<div class="border-t pt-4">
					<p class="text-muted-foreground text-sm">
						Total servicios: {{ store.providerServicesCount() }}
					</p>
				</div>
			}
		</div>
	</section>
</section>
