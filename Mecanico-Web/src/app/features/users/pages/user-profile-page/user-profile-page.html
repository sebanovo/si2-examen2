<section class="space-y-6">
	@if (store.ownProfileLoading()) {
		<section class="space-y-4">
			<hlm-skeleton class="h-44 w-full rounded-2xl" />
			<hlm-skeleton class="h-80 w-full rounded-2xl" />
		</section>
	} @else if (store.ownProfileError()) {
		<app-table-error
			variant="destructive"
			icon="lucideX"
			title="No se pudo cargar tu perfil"
			[description]="
				store.ownProfileError()?.message || 'Ocurrió un error inesperado.'
			"
			[showAction]="true"
			actionLabel="Reintentar"
			(actionClick)="onRetry()"
		/>
	} @else if (store.ownProfile()) {
		@let user = store.ownProfile();

		<app-user-profile-hero
			[user]="user"
			[editMode]="editMode()"
			(editClick)="onEnableEdit()"
		/>

		<section class="grid gap-6 xl:grid-cols-[1.4fr_0.8fr]">
			<app-user-profile-form-card
				[user]="user"
				[form]="form"
				[editMode]="editMode()"
				[loading]="store.updatingOwnProfile()"
				[error]="store.updateOwnProfileError()"
				(cancelClick)="onCancelEdit()"
				(saveClick)="onSubmit()"
			/>

			<aside class="space-y-6">
				<app-user-profile-roles-card [user]="user" />

				<app-user-profile-activity-card [user]="user" />
			</aside>
		</section>
	}
</section>
