<div class="grid gap-6 p-6">
	<!-- KPIs -->
	<div class="grid grid-cols-1 gap-4 sm:grid-cols-2 lg:grid-cols-4">
		<div class="rounded-xl border bg-white p-4 shadow-sm">
			<p class="text-muted-foreground text-sm">Providers</p>
			<p class="text-2xl font-bold">24</p>
			<p class="text-xs text-green-600">+3 este mes</p>
		</div>

		<div class="rounded-xl border bg-white p-4 shadow-sm">
			<p class="text-muted-foreground text-sm">Técnicos</p>
			<p class="text-2xl font-bold">87</p>
			<p class="text-xs text-blue-600">Activos</p>
		</div>

		<div class="rounded-xl border bg-white p-4 shadow-sm">
			<p class="text-muted-foreground text-sm">Incidentes</p>
			<p class="text-2xl font-bold">12</p>
			<p class="text-xs text-red-600">Pendientes</p>
		</div>

		<div class="rounded-xl border bg-white p-4 shadow-sm">
			<p class="text-muted-foreground text-sm">Servicios</p>
			<p class="text-2xl font-bold">156</p>
			<p class="text-xs text-purple-600">Hoy</p>
		</div>
	</div>

	<!-- Calendar + side panel -->
	<div class="rounded-xl border bg-white p-4 shadow-sm">
		<h2 class="mb-4 text-sm font-medium">Calendario</h2>

		<div class="flex flex-col gap-6 lg:flex-row lg:items-start">
			<!-- Calendario -->
			<div class="flex w-full justify-center lg:w-auto">
				<hlm-calendar [(date)]="selectedDate" [min]="minDate" [max]="maxDate" />
			</div>

			<!-- Panel derecho -->
			<div class="flex w-full flex-col gap-3 lg:min-w-[180px]">
				<div class="rounded-lg border p-3">
					<p class="text-muted-foreground text-xs">Eventos hoy</p>
					<p class="text-lg font-semibold">3</p>
				</div>

				<div class="rounded-lg border p-3">
					<p class="text-muted-foreground text-xs">Incidentes</p>
					<p class="text-lg font-semibold text-red-500">1</p>
				</div>

				<div class="rounded-lg border p-3">
					<p class="text-muted-foreground text-xs">Servicios</p>
					<p class="text-lg font-semibold text-green-600">8</p>
				</div>
			</div>
		</div>
	</div>
</div>
