<section class="space-y-6">
	<section hlmCard>
		<app-card-header
			title="Técnicos"
			description="Gestiona los técnicos registrados para tu proveedor"
			icon="lucideUsers"
			[showAction]="!store.techniciansIsEmpty()"
			actionLabel="Nuevo"
			actionIcon="lucidePlus"
			(actionClick)="onOpenCreateDialog()"
		/>

		<div hlmCardContent class="space-y-4">
			@if (store.techniciansLoading() && !store.techniciansHasLoaded()) {
				<div class="space-y-4">
					<hlm-skeleton class="h-10 w-full rounded-md" />
					<hlm-skeleton class="h-10 w-full rounded-md" />
					<hlm-skeleton class="h-10 w-full rounded-md" />
					<hlm-skeleton class="h-10 w-full rounded-md" />
				</div>
			} @else if (store.hasTechniciansError()) {
				<app-table-error
					variant="destructive"
					icon="lucideAlertCircle"
					[description]="
						store.techniciansError()?.message || 'Ocurrió un error inesperado'
					"
					title="No se pudieron cargar los técnicos"
					[showAction]="true"
					actionLabel="Reintentar"
					(actionClick)="onRetry()"
				/>
			} @else if (store.techniciansIsEmpty()) {
				<app-empty-state
					title="Sin técnicos"
					description="Aún no existen técnicos registrados para tu proveedor."
					icon="lucideInbox"
					[showAction]="true"
					actionLabel="Registrar primer técnico"
					actionIcon="lucidePlus"
					(actionClick)="onOpenCreateDialog()"
				/>
			} @else {
				<app-provider-me-table
					[technicians]="store.technicians()"
					(editTechnician)="onEditTechnician($event)"
				/>

				<div class="border-t pt-4">
					<p class="text-muted-foreground text-sm">
						Total técnicos: {{ store.techniciansCount() }}
					</p>
				</div>
			}
		</div>
	</section>

	<app-provider-me-create-dialog
		[open]="createDialogOpen()"
		[loading]="store.creatingTechnician()"
		[error]="store.creatingTechnicianError()"
		(openChange)="onCreateDialogOpenChange($event)"
		(createTechnician)="onCreateTechnician($event)"
	/>

	<app-provider-me-edit-dialog
		[open]="editDialogOpen()"
		[technician]="selectedTechnicianForEdit()"
		[loading]="store.updatingTechnician()"
		[error]="store.updatingTechnicianError()"
		(openChange)="onEditDialogOpenChange($event)"
		(updateTechnician)="onUpdateTechnician($event)"
	/>
</section>
