<form [formGroup]="form" (ngSubmit)="submit()">
	<hlm-field-group>
		<div class="flex flex-col items-center gap-1 text-center">
			<h1 class="text-2xl font-bold">Inicia sesión en tu cuenta</h1>
			<p class="text-muted-foreground text-sm text-balance">
				Ingresa tus credenciales para acceder a tu cuenta
			</p>
		</div>

		@if (errorMessage()) {
			<div
				class="rounded-md border border-red-200 bg-red-50 px-3 py-2 text-sm text-red-600"
			>
				{{ errorMessage() }}
			</div>
		}

		<app-email-input
			[control]="form.controls.email"
			inputId="email"
			label="Correo electrónico"
			placeholder="thunder@ejemplo.com"
			icon="lucideMail"
		/>

		<div class="space-y-2">
			<div class="flex items-center">
				<span class="text-sm font-medium">Contraseña</span>

				<a
					class="text-muted-foreground ml-auto text-sm underline-offset-4 hover:underline"
					routerLink="/auth/forgot-password"
				>
					¿Olvidaste tu contraseña?
				</a>
			</div>

			<app-password-input
				[control]="form.controls.password"
				inputId="password"
				label=""
			/>
		</div>

		<hlm-field>
			<button hlmBtn type="submit" [disabled]="form.invalid || isSubmitting()">
				@if (isSubmitting()) {
					Iniciando sesión...
				} @else {
					Iniciar sesión
				}
			</button>
		</hlm-field>

		<hlm-field-separator>O</hlm-field-separator>

		<hlm-field>
			<p hlmFieldDescription class="text-center">
				¿No tienes una cuenta?
				<a routerLink="/auth/signup">Regístrate</a>
			</p>
		</hlm-field>
	</hlm-field-group>
</form>
