<div
  class="from-primary/10 via-background to-primary/5 relative h-full overflow-hidden rounded-3xl border bg-gradient-to-br p-6 shadow-sm"
>
  <div class="space-y-5">
    <div>
      <p
        class="text-muted-foreground text-sm font-medium tracking-wide uppercase"
      >
        {{ eyebrow() || companyName() }}
      </p>

      <h2 class="mt-2 text-xl font-semibold tracking-tight">
        {{ title() }}
      </h2>

      <p class="text-muted-foreground mt-2 leading-7">
        {{ description() }}
      </p>
    </div>

    <div class="space-y-3">
      <div class="bg-background/80 rounded-2xl border p-4 backdrop-blur">
        <div class="flex items-center gap-3">
          @if (icon()) {
            <div
              class="bg-primary/10 text-primary flex h-10 w-10 items-center justify-center rounded-xl"
            >
              <ng-icon [name]="icon()!" size="18" />
            </div>
          }

          <div>
            <p class="font-medium">{{ infoTitle() }}</p>
            <p class="text-muted-foreground mt-1 text-sm leading-6">
              {{ infoDescription() }}
            </p>
          </div>
        </div>
      </div>

      <div class="rounded-2xl border border-dashed p-4">
        <p class="font-medium">{{ boxTitle() }}</p>
        <p class="text-muted-foreground mt-1 text-sm leading-6">
          {{ boxDescription() }}
        </p>
      </div>

      <ng-content select="[brand-extra]" />
    </div>
  </div>

  <div
    class="bg-primary/10 absolute top-0 right-0 h-32 w-32 rounded-full blur-3xl"
  ></div>
  <div
    class="bg-primary/10 absolute bottom-0 left-0 h-40 w-40 rounded-full blur-3xl"
  ></div>
</div>
